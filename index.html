<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta
      name="description"
      content="C&C — Influencer marketing. Launching soon."
    />
    <meta name="theme-color" content="#08090a" />
    <title>C&amp;C</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:ital,wght@0,400;0,700;1,400&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
    <link rel="icon" href="assets/favicon.png" type="image/png" />
    <link rel="apple-touch-icon" href="assets/favicon.png" />
  </head>
  <body>
    <div class="cursor-glow" aria-hidden="true"></div>
    <div class="glow" aria-hidden="true"></div>

    <main class="main">
      <div class="inner">
        <img
          class="logo animate-in"
          src="assets/logo.png"
          width="220"
          height="220"
          alt="C&amp;C"
          decoding="async"
          fetchpriority="high"
        />

        <h1 class="headline animate-in stagger-1">
          <span class="headline-line">Influencer marketing,</span>
          <span class="headline-line">refined for modern brands.</span>
        </h1>

        <div class="cta-block animate-in stagger-2">
          <p class="cta-eyebrow">Next step</p>
          <a class="cta" href="mailto:tafiqul@contentco.info">
            <span class="cta-label">Send an email</span>
            <span class="cta-email">tafiqul@contentco.info</span>
            <span class="cta-icon" aria-hidden="true">
              <svg width="18" height="18" viewBox="0 0 24 24" fill="none">
                <path
                  d="M5 12h14M13 6l6 6-6 6"
                  stroke="currentColor"
                  stroke-width="2"
                  stroke-linecap="round"
                  stroke-linejoin="round"
                />
              </svg>
            </span>
          </a>
          <p class="cta-sub">Opens your default mail app</p>
        </div>
      </div>
    </main>

    <footer class="footer animate-in stagger-3">
      <span>© 2026 Content &amp; Co</span>
    </footer>

    <script src="main.js" defer></script>
  </body>
</html>
